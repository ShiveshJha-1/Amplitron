name: CD - Release Build

on:
  workflow_run:
    workflows: ["CI - Build and Test"]
    types: [completed]
    branches: [main]

permissions:
  contents: write

jobs:
  package-and-release:
    name: Package and Release
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Generate Version
      id: version
      run: |
        COUNT=$(git rev-list --count HEAD)
        echo "version=0.1.${COUNT}" >> $GITHUB_OUTPUT
        echo "Release version: 0.1.${COUNT}"

    - name: Download Linux Build
      uses: actions/download-artifact@v4
      with:
        name: linux-build
        path: artifacts/linux
        run-id: ${{ github.event.workflow_run.id }}
        github-token: ${{ secrets.GITHUB_TOKEN }}

    - name: Download macOS Build
      uses: actions/download-artifact@v4
      with:
        name: macos-build
        path: artifacts/macos
        run-id: ${{ github.event.workflow_run.id }}
        github-token: ${{ secrets.GITHUB_TOKEN }}

    - name: Download Windows Build
      uses: actions/download-artifact@v4
      with:
        name: windows-build
        path: artifacts/windows
        run-id: ${{ github.event.workflow_run.id }}
        github-token: ${{ secrets.GITHUB_TOKEN }}

    - name: Package Windows
      run: |
        mkdir -p release/Amplitron-Windows
        cp artifacts/windows/guitar-amp.exe release/Amplitron-Windows/Amplitron.exe
        cp artifacts/windows/*.dll release/Amplitron-Windows/ 2>/dev/null || true
        cp README.md release/Amplitron-Windows/
        cp -r assets release/Amplitron-Windows/ || true
        cd release && zip -r Amplitron-Windows-x64.zip Amplitron-Windows

    - name: Package macOS
      run: |
        mkdir -p release/Amplitron.app/Contents/MacOS
        mkdir -p release/Amplitron.app/Contents/Resources
        cp artifacts/macos/guitar-amp release/Amplitron.app/Contents/MacOS/Amplitron
        chmod +x release/Amplitron.app/Contents/MacOS/Amplitron
        cp -r assets release/Amplitron.app/Contents/Resources/ || true
        cat > release/Amplitron.app/Contents/Info.plist << 'PLIST'
        <?xml version="1.0" encoding="UTF-8"?>
        <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
        <plist version="1.0">
        <dict>
          <key>CFBundleExecutable</key><string>Amplitron</string>
          <key>CFBundleIdentifier</key><string>com.amplitron.app</string>
          <key>CFBundleName</key><string>Amplitron</string>
          <key>CFBundleVersion</key><string>${{ steps.version.outputs.version }}</string>
          <key>CFBundlePackageType</key><string>APPL</string>
          <key>NSHighResolutionCapable</key><true/>
          <key>NSMicrophoneUsageDescription</key><string>Amplitron needs microphone access for guitar input.</string>
        </dict>
        </plist>
        PLIST
        cd release && tar -czf Amplitron-macOS-Universal.tar.gz Amplitron.app

    - name: Package Linux
      run: |
        mkdir -p release/Amplitron-Linux
        cp artifacts/linux/guitar-amp release/Amplitron-Linux/amplitron
        chmod +x release/Amplitron-Linux/amplitron
        cp README.md release/Amplitron-Linux/
        cp -r assets release/Amplitron-Linux/ || true
        printf '#!/bin/bash\ncd "$(dirname "$0")"\n./amplitron\n' > release/Amplitron-Linux/amplitron.sh
        chmod +x release/Amplitron-Linux/amplitron.sh
        cd release && tar -czf Amplitron-Linux-x64.tar.gz Amplitron-Linux

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v${{ steps.version.outputs.version }}
        name: Amplitron v${{ steps.version.outputs.version }}
        body: |
          ## Amplitron v${{ steps.version.outputs.version }}

          ### Downloads
          | Platform | File |
          |----------|------|
          | Windows 10/11 (64-bit) | `Amplitron-Windows-x64.zip` |
          | macOS 10.15+ | `Amplitron-macOS-Universal.tar.gz` |
          | Linux x64 | `Amplitron-Linux-x64.tar.gz` |

          **Website**: https://sudip-mondal-2002.github.io/Amplitron/
          **Contact**: sudmondal2002@gmail.com
        files: |
          release/Amplitron-Windows-x64.zip
          release/Amplitron-macOS-Universal.tar.gz
          release/Amplitron-Linux-x64.tar.gz

    - name: Deploy Website
      uses: peaceiris/actions-gh-pages@v3
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./docs
        publish_branch: gh-pages
